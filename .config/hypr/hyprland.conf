# Sources
source = ~/.config/hypr/env.conf
source = ~/.config/hypr/monitors.conf
source = ~/.config/hypr/colors.conf
source = ~/.config/hypr/input.conf

# Default Applications
$terminal = kitty
$fileManager = thunar
$menu = fuzzel
$browser = firefox

# Startup Services

# Force center master on every reload (workaround for hyprwm/Hyprland#8608)
exec = hyprctl dispatch layoutmsg orientationcenter

exec-once = /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1
exec-once = hyprpaper & mako & waybar
exec-once = hypridle
exec-once = element-desktop
exec-once = flatpak run com.borgbase.Vorta
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = systemctl --user import-environment WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = /usr/lib/xdg-desktop-portal-hyprland
exec-once = gnome-keyring-daemon --start --components=secrets

# General
general {
    gaps_in = 5
    gaps_out = 10
    border_size = 2
    col.active_border = $blue
    col.inactive_border = $black
    layout = master
    allow_tearing = false
}

# Disable color management (Hyprland 0.53 bug - washes out Kitty colors)
render {
    cm_enabled = false
}

# Decoration
decoration {
    rounding = 0
    inactive_opacity = 1.00
    dim_inactive = false
    dim_strength = 0.1

    blur {
        enabled = true
        size = 3
        passes = 1
    }
}

# Xwayland
xwayland {
    force_zero_scaling = true
    use_nearest_neighbor = true
    enabled = true
}

# Animations
animations {
    enabled = yes

    bezier = easeOutQuint,0.23,1,0.32,1
    bezier = easeInOutCubic,0.65,0.05,0.36,1
    bezier = linear,0,0,1,1
    bezier = almostLinear,0.5,0.5,0.75,1.0
    bezier = quick,0.15,0,0.1,1

    animation = global, 1, 10, default
    animation = border, 1, 5.39, easeOutQuint
    animation = windows, 1, 4.79, easeOutQuint
    animation = windowsIn, 1, 4.1, easeOutQuint, popin 87%
    animation = windowsOut, 1, 1.49, linear, popin 87%
    animation = fadeIn, 1, 1.73, almostLinear
    animation = fadeOut, 1, 1.46, almostLinear
    animation = fade, 1, 3.03, quick
    animation = layers, 1, 3.81, easeOutQuint
    animation = layersIn, 1, 4, easeOutQuint, fade
    animation = layersOut, 1, 1.5, linear, fade
    animation = fadeLayersIn, 1, 1.79, almostLinear
    animation = fadeLayersOut, 1, 1.39, almostLinear
    animation = workspaces, 0, 0, ease
}

# Theme overrides (must be after general/decoration/animations)
source = ~/.config/hypr/colors.conf

# Layout
dwindle {
    pseudotile = yes
    preserve_split = yes
}

master {
    mfact = 0.50
    orientation = center
    slave_count_for_center_master = 0
}

# Misc
misc {
    force_default_wallpaper = 0
    disable_splash_rendering = true
    disable_hyprland_logo = yes
    focus_on_activate = true
}

cursor {
    hide_on_key_press = true
}

# Window Rules & Keybinds
source = ~/.config/hypr/rules.conf
source = ~/.config/hypr/keybinds.conf
