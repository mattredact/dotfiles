# Take control over fullscreen status
windowrule = suppress_event maximize, match:class .*
windowrule = suppress_event fullscreen, match:class .*

# Window opacity (active / inactive)
windowrule = opacity 0.97 0.9, match:class .*
windowrule = opacity 1.0 0.97, match:class (firefox|brave|vivaldi-stable)
windowrule = opacity 1.0 0.97, match:class (kitty|com.mitchellh.ghostty)

# Workspace assignments
windowrule = workspace 5, match:class .*Element.*
windowrule = workspace 5, match:class Slack
windowrule = workspace 6, match:class brave-jnpecgipniidlgicjocehkhajgdnjekh-Default
windowrule = workspace 6, match:class .*Plexamp.*
windowrule = workspace 5, match:class .*thunderbird.*

# Floating windows
windowrule = float on, match:class (nwg-look|qt5ct|mpv)

# Dialogs
windowrule = float on, match:title Open.File.*
windowrule = float on, match:title Select.a.File.*
windowrule = float on, match:title Choose.wallpaper.*
windowrule = float on, match:title Open.Folder.*
windowrule = float on, match:title Save.As.*
windowrule = float on, match:title Library.*
windowrule = float on, match:title Picture-in-Picture
windowrule = pin on, match:title Picture-in-Picture

# Steam & Gaming Rules
windowrule = float on, match:class steam, match:title Steam
windowrule = size 1200 800, match:class steam, match:title Steam
windowrule = center on, match:class steam, match:title Steam
windowrule = float on, match:class steam, match:title Friends.List
windowrule = float on, match:class steam, match:title Steam.Settings

# Game windows - borderless fullscreen
windowrule = border_size 0, match:class steam_app_.*
windowrule = no_shadow on, match:class steam_app_.*
windowrule = no_blur on, match:class steam_app_.*
windowrule = rounding 0, match:class steam_app_.*
windowrule = fullscreen on, match:class steam_app_.*

# Other game launchers
windowrule = float on, match:class lutris
windowrule = float on, match:class heroic

# Workspace monitor assignments
workspace = 1, monitor:DP-1
workspace = 2, monitor:DP-1
workspace = 3, monitor:DP-1
workspace = 4, monitor:DP-1
workspace = 5, monitor:DP-2
workspace = 6, monitor:DP-2

# Vertical monitor orientation
workspace = m[DP-2], layoutopt:orientation:top
