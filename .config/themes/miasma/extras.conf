$activeBorderColorGreen = rgb(78824b)
$activeBorderColorDark = rgb(3c4125)

general {
    col.active_border = $activeBorderColorGreen $activeBorderColorDark 35deg
    col.inactive_border = $black
}

group {
    col.border_active = $activeBorderColorGreen $activeBorderColorDark 35deg
}

decoration {
    shadow {
        enabled = true
        range = 18
        render_power = 4
        color = rgba(0, 0, 0, 0.6)
        offset = 2 2
    }
}

animations {
  enabled = yes

  bezier = neon,    0.4,  0.0,  0.2,  1.0
  bezier = miasma,  0.55, 0.02, 0.38, 0.98
  bezier = fogbank, 0.70, 0.01, 0.30, 1.00
  bezier = toxic,   0.85, 0.00, 0.25, 1.00

  animation = windows,     1, 4, miasma
  animation = windowsIn,   0,  0, default
  animation = windowsOut,  0,  0, default
  animation = windowsMove, 1,  3, miasma
  animation = fade,        1, 4, fogbank
  animation = fadeIn,      1, 4, fogbank
  animation = fadeOut,     1, 3, fogbank
  animation = border,      1,  3, default
  animation = borderangle, 1, 70, linear, loop
  animation = workspaces,  1, 1, fogbank, fade
}
